<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>URL Splitter</title>
		<style>
			:root {
				--primary: #6366f1;
				--primary-hover: #4f46e5;
				--bg: #0f172a;
				--card-bg: rgba(30, 41, 59, 0.7);
				--text: #f8fafc;
				--text-dim: #94a3b8;
				--border: rgba(255, 255, 255, 0.1);
				--gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
			}

			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
				font-family:
					"Inter",
					-apple-system,
					BlinkMacSystemFont,
					"Segoe UI",
					Roboto,
					sans-serif;
			}

			body {
				background-color: var(--bg);
				background-image:
					radial-gradient(
						circle at 20% 20%,
						rgba(99, 102, 241, 0.15) 0%,
						transparent 40%
					),
					radial-gradient(
						circle at 80% 80%,
						rgba(168, 85, 247, 0.15) 0%,
						transparent 40%
					);
				color: var(--text);
				min-height: 100vh;
				display: flex;
				justify-content: center;
				align-items: center;
				padding: 20px;
			}

			.container {
				width: 100%;
				max-width: 1200px;
				background: var(--card-bg);
				backdrop-filter: blur(12px);
				-webkit-backdrop-filter: blur(12px);
				border: 1px solid var(--border);
				border-radius: 24px;
				padding: 40px;
				box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
				animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
			}

			@keyframes fadeIn {
				from {
					opacity: 0;
					transform: translateY(20px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			h1 {
				font-size: 2.5rem;
				font-weight: 800;
				margin-bottom: 10px;
				background: var(--gradient);
				-webkit-background-clip: text;
				background-clip: text;
				-webkit-text-fill-color: transparent;
				text-align: center;
			}

			p.subtitle {
				color: var(--text-dim);
				text-align: center;
				margin-bottom: 40px;
				font-size: 1.1rem;
			}

			.input-group {
				position: relative;
				margin-bottom: 30px;
			}

			textarea {
				width: 100%;
				background: rgba(15, 23, 42, 0.6);
				border: 2px solid var(--border);
				border-radius: 16px;
				padding: 20px;
				color: var(--text);
				font-size: 1rem;
				resize: vertical;
				min-height: 120px;
				transition: all 0.3s ease;
				outline: none;
			}

			textarea:focus {
				border-color: var(--primary);
				box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
			}

			.button-row {
				display: flex;
				gap: 15px;
				margin-bottom: 30px;
			}

			button {
				flex: 1;
				padding: 16px 24px;
				border-radius: 14px;
				border: none;
				font-weight: 600;
				font-size: 1rem;
				cursor: pointer;
				transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 8px;
			}

			.btn-primary {
				background: var(--gradient);
				color: white;
				box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
			}

			.btn-primary:hover {
				transform: translateY(-2px);
				box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
			}

			.btn-secondary {
				background: rgba(255, 255, 255, 0.05);
				color: var(--text);
				border: 1px solid var(--border);
			}

			.btn-secondary:hover {
				background: rgba(255, 255, 255, 0.1);
			}

			#results {
				display: grid;
				gap: 12px;
			}

			.link-card {
				background: rgb(12 17 25);
				border: 1px solid var(--border);
				border-radius: 12px;
				padding: 15px 20px;
				display: flex;
				align-items: center;
				justify-content: space-between;
				transition: all 0.2s ease;
				animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
			}

			@keyframes slideIn {
				from {
					opacity: 0;
					transform: translateX(-10px);
				}
				to {
					opacity: 1;
					transform: translateX(0);
				}
			}

			.link-card:hover {
				background: rgba(255, 255, 255, 0.07);
				border-color: var(--primary);
			}

			.link-info {
				display: flex;
				flex-direction: column;
				gap: 4px;
				overflow: hidden;
			}

			.link-label {
				font-size: 0.8rem;
				color: var(--text-dim);
				text-transform: uppercase;
				letter-spacing: 1px;
			}

			.link-url {
				color: var(--text-dim);
				text-decoration: none;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
				font-weight: 500;
			}

			.link-actions {
				display: flex;
				gap: 10px;
			}

			.icon-btn {
				background: rgba(255, 255, 255, 0.05);
				border: 1px solid var(--border);
				border-radius: 8px;
				padding: 8px;
				color: var(--text-dim);
				cursor: pointer;
				transition: all 0.2s ease;
			}

			.icon-btn:hover {
				color: var(--text);
				background: var(--primary);
				border-color: var(--primary);
			}

			.toast {
				position: fixed;
				bottom: 30px;
				left: 50%;
				transform: translateX(-50%) translateY(100px);
				background: #10b981;
				color: white;
				padding: 12px 24px;
				border-radius: 99px;
				font-weight: 600;
				box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
				transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
				z-index: 1000;
			}

			.toast.show {
				transform: translateX(-50%) translateY(0);
			}
		</style>
	</head>
	<body>
		<div class="container">
			<h1>URL Splitter</h1>
			<p class="subtitle">
				Convert multiple lesson URLs into single lesson links instantly.
			</p>

			<div class="input-group">
				<textarea
					id="urlInput"
					placeholder="Paste your multiple lesson URL here..."
				></textarea>
			</div>

			<div class="button-row">
				<button onclick="splitByParam('lesson')" class="btn-primary">
					<svg
						width="20"
						height="20"
						fill="none"
						stroke="currentColor"
						stroke-width="2"
						viewBox="0 0 24 24"
					>
						<path d="M13 10V3L4 14h7v7l9-11h-7z"></path>
					</svg>
					Split Lessons
				</button>
				<button onclick="splitByParam('chapter')" class="btn-primary">
					<svg
						width="20"
						height="20"
						fill="none"
						stroke="currentColor"
						stroke-width="2"
						viewBox="0 0 24 24"
					>
						<path d="M4 6h16M4 12h16m-7 6h7"></path>
					</svg>
					Split Chapters
				</button>
				<button onclick="openAll()" class="btn-secondary">
					<svg
						width="20"
						height="20"
						fill="none"
						stroke="currentColor"
						stroke-width="2"
						viewBox="0 0 24 24"
					>
						<path
							d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"
						></path>
					</svg>
					Open All
				</button>
				<button onclick="copyAll()" class="btn-secondary">
					<svg
						width="20"
						height="20"
						fill="none"
						stroke="currentColor"
						stroke-width="2"
						viewBox="0 0 24 24"
					>
						<path
							d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"
						></path>
					</svg>
					Copy All
				</button>
			</div>

			<div id="results"></div>
		</div>

		<div id="toast" class="toast">Action completed!</div>

		<script>
			let currentLinks = [];

			function showToast(message) {
				const toast = document.getElementById("toast");
				toast.textContent = message;
				toast.classList.add("show");
				setTimeout(() => toast.classList.remove("show"), 2000);
			}

			function splitByParam(paramName) {
				const rawUrl = document.getElementById("urlInput").value.trim();
				if (!rawUrl) return;

				try {
					const url = new URL(rawUrl);
					const params = new URLSearchParams(url.search);
					const paramValue = params.get(paramName);

					if (!paramValue) {
						alert(`No ${paramName} ID found in the URL.`);
						return;
					}

					// Decode and split the values
					const items = decodeURIComponent(paramValue).split(",");
					const resultsContainer = document.getElementById("results");
					resultsContainer.innerHTML = "";
					currentLinks = [];

					items.forEach((id, index) => {
						const newParams = new URLSearchParams(params);
						newParams.set(paramName, id);
						const singleUrl = `${url.origin}${url.pathname}?${newParams.toString()}`;
						currentLinks.push(singleUrl);

						const label =
							paramName.charAt(0).toUpperCase() + paramName.slice(1);
						const card = document.createElement("div");
						card.className = "link-card";
						card.style.animationDelay = `${index * 0.05}s`;
						card.innerHTML = `
                        <div class="link-info">
                            <span class="link-label">${label} ${id}</span>
                            <a href="${singleUrl}" target="_blank" class="link-url">${singleUrl}</a>
                        </div>
                        <div class="link-actions">
                            <button class="icon-btn" onclick="copyLink('${singleUrl}')" title="Copy Link">
                                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"></path></svg>
                            </button>
                            <button class="icon-btn" onclick="window.open('${singleUrl}', '_blank')" title="Open Link">
                                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                            </button>
                        </div>
                    `;
						resultsContainer.appendChild(card);
					});

					showToast(`Split into ${items.length} ${paramName}s`);
				} catch (e) {
					alert("Invalid URL format");
				}
			}

			async function copyLink(text) {
				await navigator.clipboard.writeText(text);
				showToast("Link copied to clipboard");
			}

			async function copyAll() {
				if (currentLinks.length === 0) return;
				await navigator.clipboard.writeText(currentLinks.join("\n"));
				showToast("All links copied to clipboard");
			}

			function openAll() {
				if (currentLinks.length === 0) return;

				const count = currentLinks.length;
				if (count > 10) {
					if (
						!confirm(
							`Are you sure you want to open ${count} tabs at once?\n\nTip: You might need to allow popups in your browser settings.`,
						)
					)
						return;
				}

				// Opening with a small delay helps avoid some browser popup blocker triggers
				currentLinks.forEach((link, index) => {
					setTimeout(() => {
						window.open(link, "_blank");
					}, index * 200);
				});

				showToast(`Opening ${count} links...`);
			}

			// Add support for "Enter" key
			document.getElementById("urlInput").addEventListener("keydown", (e) => {
				if (e.key === "Enter" && !e.shiftKey) {
					e.preventDefault();
					splitByParam("lesson");
				}
			});
		</script>
	</body>
</html>
